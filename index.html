<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="script-src 'self'; object-src 'none'; base-uri 'self'">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#d4708f">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>私人訊號</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div id="app" class="app panel-collapsed">

    <main class="stage" aria-label="虛擬手機">
      <div class="phone" id="phone">
        <div class="phone-notch" aria-hidden="true"></div>
        <div class="phone-screen" id="phoneScreen"></div>
      </div>
    </main>

    <!-- 管理/開發輔助區：預設收合，不屬於手機本體 -->
    <aside class="panel" id="panel" aria-label="管理輔助面板">
      <div class="panel-tabs" id="panelTabs" role="tablist"></div>
      <div class="panel-body" id="panelBody"></div>
    </aside>

    <button class="panel-toggle" id="panelToggle" aria-expanded="false" aria-label="開啟或收合管理輔助面板">⟨ 管理</button>
  </div>

  <div id="modalRoot"></div>

  <!-- 載入守門員(v91 外移至 guard.js 以配合 CSP;功能不變) -->
  <script src="./guard.js?v=91"></script>

  <script type="module" src="./app.js?v=2"></script>
</body>
</html>
